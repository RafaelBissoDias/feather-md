<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="#111111"/>

  <g transform="translate(256, 248)">
    <!-- Feather vane -->
    <path d="M 0 -155
             C 85 -155 125 -75 105 10
             C 85 90 25 135 0 158
             C -25 135 -85 90 -105 10
             C -125 -75 -85 -155 0 -155 Z"
          fill="#ea580c"
          transform="rotate(-30)"/>

    <!-- Center vein -->
    <line x1="0" y1="-155" x2="0" y2="185"
          stroke="#111111" stroke-width="12" stroke-linecap="round"
          transform="rotate(-30)" opacity="0.55"/>

    <!-- Barbs (left side of vein) -->
    <line x1="0" y1="-90" x2="-90" y2="-30" stroke="#111111" stroke-width="7" stroke-linecap="round" transform="rotate(-30)" opacity="0.25"/>
    <line x1="0" y1="-40" x2="-100" y2="20" stroke="#111111" stroke-width="7" stroke-linecap="round" transform="rotate(-30)" opacity="0.25"/>
    <line x1="0" y1="15"  x2="-100" y2="75" stroke="#111111" stroke-width="7" stroke-linecap="round" transform="rotate(-30)" opacity="0.25"/>
    <line x1="0" y1="65"  x2="-80"  y2="120" stroke="#111111" stroke-width="7" stroke-linecap="round" transform="rotate(-30)" opacity="0.25"/>

    <!-- Quill tip -->
    <path d="M -8 148 L -28 195 L 0 172 L 28 195 L 8 148 Z"
          fill="#c2410c"
          transform="rotate(-30)"/>
  </g>
</svg>
